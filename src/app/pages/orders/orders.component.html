<div class="orders-container">
  <!-- Main Content -->
  <main class="orders-main">
    <div class="content-container">
      <!-- Page Heading -->
      <div class="page-header">
        <p class="page-title">Product Orders</p>
        <button class="btn-new-order">
          <span class="material-symbols-outlined">add_circle</span>
          <span class="truncate">New Order</span>
        </button>
      </div>

      <!-- Search and Filter Bar -->
      <div class="filter-bar">
        <!-- Search Bar -->
        <div class="search-wrapper">
          <label class="search-label">
            <div class="search-container">
              <div class="search-icon-wrapper">
                <span class="material-symbols-outlined">search</span>
              </div>
              <input class="search-input" placeholder="Search by Order ID, Product, or Customer..." value="" />
            </div>
          </label>
        </div>

        <!-- Filter Chips -->
        <div class="filter-chips">
          <button class="chip active">
            <p class="chip-text">All</p>
          </button>
          <button class="chip">
            <p class="chip-text">Processing</p>
          </button>
          <button class="chip">
            <p class="chip-text">Shipped</p>
          </button>
          <button class="chip">
            <p class="chip-text">Delivered</p>
          </button>
          <button class="chip">
            <p class="chip-text">Canceled</p>
          </button>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="table-wrapper">
        <div class="table-container">
          <table class="orders-table">
            <thead>
              <tr class="table-header-row">
                <th class="table-header">Order ID</th>
                <th class="table-header">Product</th>
                <th class="table-header">Customer</th>
                <th class="table-header">Date</th>
                <th class="table-header">Total</th>
                <th class="table-header">Status</th>
                <th class="table-header">Actions</th>
              </tr>
            </thead>
            <tbody class="table-body">
              @for (order of dataService.orders(); track order.id) {
              <tr class="table-row">
                <td class="table-cell order-id">{{ order.id }}</td>
                <td class="table-cell">
                  <div class="product-cell">
                    <div class="product-image" [style.background-image]="'url(' + order.productImage + ')'">
                    </div>
                    <span class="product-name">{{ order.productName }}</span>
                  </div>
                </td>
                <td class="table-cell">{{ order.customer }}</td>
                <td class="table-cell">{{ order.date }}</td>
                <td class="table-cell total">{{ order.total }}</td>
                <td class="table-cell">
                  <span class="status-badge" [class.status-shipped]="order.status === 'Shipped'"
                    [class.status-delivered]="order.status === 'Delivered'"
                    [class.status-processing]="order.status === 'Processing'"
                    [class.status-canceled]="order.status === 'Canceled'">
                    {{ order.status }}
                  </span>
                </td>
                <td class="table-cell">
                  <button class="action-button">
                    <span class="material-symbols-outlined">more_vert</span>
                  </button>
                </td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <span class="pagination-info">Showing 1 to 5 of 20 results</span>
        <div class="pagination-buttons">
          <button class="pagination-button">Previous</button>
          <button class="pagination-button">Next</button>
        </div>
      </div>
    </div>
  </main>
</div>

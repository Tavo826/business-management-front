<div class="login-container">
  <div class="login-wrapper">
    <div class="content-split">
      <!-- Left Side: Welcome Panel -->
      <div class="welcome-panel">
        <div class="background-overlay"></div>

        <div class="panel-content">
          <div class="welcome-text">
            <h1 class="welcome-title">
              Tu asistente en tu negocio.
            </h1>
            <h2 class="welcome-subtitle">
              Bienvenido de nuevo! Accede a tus perfiles de negocio, gestiona pedidos de productos y simplifica tu flujo de trabajo con nuestra plataforma poderosa e intuitiva.
            </h2>
          </div>
          <div class="panel-actions">
            <button class="btn-learn-more">
              <span class="truncate">Aprender más</span>
            </button>
          </div>
        </div>

        <div class="panel-footer">
          <p class="copyright">© 2026 All rights reserved.</p>
        </div>
      </div>

      <!-- Right Side: Action Panel -->
      <div class="action-panel">
        <div class="form-container">
          <div class="form-header">
            <h3 class="form-title">Bienvenido de nuevo</h3>
            <p class="form-subtitle">Por favor ingresa tus datos para iniciar sesión.</p>
          </div>

          <div class="form-content">
            <div class="mode-selector">
              <div class="mode-toggle">
                <button 
                  (click)="mode.set('signin')"
                  [class.active]="mode() === 'signin'"
                  class="mode-button">
                  <span class="truncate">Iniciar Sesión</span>
                </button>
                <button 
                  (click)="navigateToRegister()"
                  class="mode-button">
                  <span class="truncate">Registrarse</span>
                </button>
              </div>
            </div>

            <form class="login-form" (submit)="login($event)">
              <label class="form-field">
                <p class="field-label">Correo Electrónico</p>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined input-icon">mail</span>
                  <input 
                    class="form-input" 
                    placeholder="Enter your email" 
                    type="email"/>
                </div>
              </label>

              <label class="form-field">
                <div class="field-header">
                  <p class="field-label">Contraseña</p>
                  <a class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="input-wrapper">
                  <span class="material-symbols-outlined input-icon">lock</span>
                  <input 
                    class="form-input password-input" 
                    placeholder="Enter your password" 
                    [type]="showPassword() ? 'text' : 'password'"/>
                  <button class="toggle-visibility" type="button" (click)="togglePasswordVisibility()">
                    <span class="material-symbols-outlined">
                      {{ showPassword() ? 'visibility_off' : 'visibility' }}
                    </span>
                  </button>
                </div>
              </label>

              <button type="submit" class="btn-submit">
                <span class="truncate">Iniciar Sesión</span>
              </button>
            </form>
          </div>

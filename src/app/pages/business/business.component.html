  <!-- Main Content -->
  <main class="main-content">
    <!-- Page Header -->
    <div class="page-header">
      <div class="header-text">
        <h1 class="page-title">My Businesses</h1>
        <p class="page-subtitle">Manage your business profiles and view key metrics.</p>
      </div>
      <button class="btn-create" (click)="createBusiness()">
        <span class="material-symbols-outlined">add</span>
        <span>Create New Business</span>
      </button>
    </div>

    <!-- Business Cards Grid -->
    <div class="business-grid">
      @for (business of businesses(); track business.id) {
        <div class="business-card">
          <div 
            class="business-image"
            [style.background-image]="'url(' + business.image + ')'">
          </div>
          <div class="business-info">
            <h3 class="business-name">{{ business.name }}</h3>
            <p 
              class="business-status"
              [class.status-active]="business.statusType === 'active'"
              [class.status-complete]="business.statusType === 'complete'"
              [class.status-reviews]="business.statusType === 'reviews'"
              [class.status-inactive]="business.statusType === 'inactive'">
              {{ business.status }}
            </p>
          </div>
          <div class="business-actions">
            <button class="btn-action btn-edit">
              <span class="material-symbols-outlined">edit</span>
              <span>Edit</span>
            </button>
            <button class="btn-action btn-delete" (click)="deleteBusiness(business.id)">
              <span class="material-symbols-outlined">delete</span>
              <span>Delete</span>
            </button>
          </div>
        </div>
      }
    </div>
  </main>
</div>
